name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Ruby (for CocoaPods if needed)
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: 3.x

    - name: Build with xcodebuild
      run: |
        xcodebuild -project JoelDeveloper.xcodeproj -scheme JoelDeveloper -sdk iphonesimulator -destination 'platform=iOS Simulator,name=iPhone 14' clean build
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: true
